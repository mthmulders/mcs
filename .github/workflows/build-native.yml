permissions:
  contents: read
name: Build Native executables

on:
  # must be triggered by build.yml
  workflow_call:
    inputs:
      head_sha:
        description: 'The commit SHA to checkout'
        required: false
        type: string

jobs:
  # Build native executable per runner
  build-native:
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: macos-x64
            os: macos-15-intel
            arch: x64
          - target: macos-aarch64
            os: macos-15
            arch: aarch64
          - target: windows-x64
            os: windows-2025
            arch: x64
          - target: linux-x64
            os: ubuntu-24.04
            arch: x64
    runs-on: ${{ matrix.os }}
    environment: native-build

    steps:
      - name: Clone repository
        uses: actions/checkout@v7.0.0
        with:
          # Disabling shallow clone is recommended for improving relevancy of reporting
          fetch-depth: 0
          ref: ${{ inputs.head_sha || github.sha }}

      - name: Set up JDK
        uses: actions/setup-java@v5.3.0
        with:
          cache: maven
          distribution: 'graalvm'
          java-version: 25

      - name: Retrieve musl toolchain from cache
        id: musl-toolchain-cache
        uses: actions/cache/restore@v5.0.5
        if: ${{ contains(matrix.os, 'ubuntu') }}
        with:
          path: ~/.musl-toolchain
          key: mcs-musl-toolchain-11

      - name: Retrieve zlib from cache
        id: zlib-toolchain-cache
        uses: actions/cache/restore@v5.0.5
        if: ${{ contains(matrix.os, 'ubuntu') }}
        with:
          path: ~/.zlib
          key: mcs-zlib-1.3.2

      - name: Get musl toolchain and compile libz against it
        shell: bash
        id: prepare-musl
        run: |
          mkdir -p ~/.musl-toolchain
          pushd ~/.musl-toolchain
          
          if [ ! -f x86_64-linux-musl-native.tgz ]; then
            echo "Downloading and compiling musl libc toolchain 11..."
            curl \
                --insecure \
                --show-error \
                --user "${MUSL_TOOLCHAIN_USER}:${MUSL_TOOLCHAIN_PASS}" \
                --location \
                --remote-name \
                --remote-header-name \
                --url "${MUSL_TOOLCHAIN_LOCATION}/11/x86_64-linux-musl/x86_64-linux-musl-native.tgz"
          fi
          popd
          
          mkdir -p ~/.zlib
          pushd ~/.zlib
          if [ ! -f zlib-1.3.2.tar.gz ]; then
              echo "Downloading and compiling zlib 1.3.2..."
              curl \
                --show-error \
                --location \
                --remote-name \
                --remote-header-name \
                --url "https://zlib.net/zlib-1.3.2.tar.gz"
          fi
          popd
          
          TMP_DIR=$(mktemp -d)
          pushd $TMP_DIR
          tar -xf ~/.musl-toolchain/x86_64-linux-musl-native.tgz
          TOOLCHAIN_DIR=$TMP_DIR/x86_64-linux-musl-native
          CC=$TOOLCHAIN_DIR/bin/gcc
          
          echo "Configuring and installing zlib..."
          tar -xf ~/.zlib/zlib-1.3.2.tar.gz
          cd zlib-1.3.2
          ./configure --prefix=$TOOLCHAIN_DIR --static
          make
          make install
          
          echo "Prepared musl toolchain at $TOOLCHAIN_DIR"
          echo "TOOLCHAIN_DIR=$TOOLCHAIN_DIR" >> $GITHUB_OUTPUT
        if: ${{ contains(matrix.os, 'ubuntu') }}
        env:
          MUSL_TOOLCHAIN_LOCATION: ${{ secrets.MUSL_TOOLCHAIN_LOCATION }}
          MUSL_TOOLCHAIN_USER: ${{ secrets.MUSL_TOOLCHAIN_USER }}
          MUSL_TOOLCHAIN_PASS: ${{ secrets.MUSL_TOOLCHAIN_PASS }}

      - name: Save musl toolchain to cache
        uses: actions/cache/save@v5.0.5
        if: ${{ contains(matrix.os, 'ubuntu') }}
        with:
          path: ~/.musl-toolchain
          key: mcs-musl-toolchain-11

      - name: Save zlib toolchain to cache
        uses: actions/cache/save@v5.0.5
        if: ${{ contains(matrix.os, 'ubuntu') }}
        with:
          path: ~/.zlib
          key: mcs-zlib-1.3.2

      - name: Cache Maven packages
        id: restore-maven-package-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build static native image for Linux
        run: |
          PATH="${TOOLCHAIN_DIR}/bin:${PATH}"
          export PATH
          mvn -B -Pnative -Pdist verify
        env:
          TOOLCHAIN_DIR: ${{ steps.prepare-musl.outputs.TOOLCHAIN_DIR }}
        if: ${{ contains(matrix.os, 'ubuntu') }}

      - name: Build static native image for Windows / macOS
        run: |
          mvn -B -Pnative -Pdist package
        if: ${{ ! contains(matrix.os, 'ubuntu') }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            target/distributions/*.zip
            target/distributions/*.tar.gz

      - name: Save downloaded Maven packages
        uses: actions/cache/save@v5.0.5
        with:
          path: ~/.m2
          key: ${{ steps.restore-maven-package-cache.outputs.cache-primary-key }}
        if: github.event.workflow_run.event != 'pull_request'
